trigger:
  - main  # Se ejecuta automáticamente cuando subes cambios a la rama main

pool:
  vmImage: 'ubuntu-latest' # Agente Linux ideal para compilar Docker de forma nativa

variables:
  # Nombre exacto de tu Service Connection (tipo Azure Resource Manager)
  azureServiceConnection: 'AzureServiceConnection' 
  # Tu servidor ACR completo
  acrLoginServer: 'luismo123456.azurecr.io'
  # Nombre del repositorio/imagen dentro de tu ACR
  imageRepository: 'proyecttopico'
  # Ruta al archivo Dockerfile en la raíz de tu proyecto
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'

stages:
- stage: BuildAndTest
  displayName: 'Etapa de Construcción y Pruebas'
  jobs:
  - job: CompileAndTest
    displayName: 'Compilar y Probar Aplicación'
    steps:
    # 1. Obtener código fuente
    - checkout: self
      displayName: 'Obtener Código Fuente'

    # 2. Construir la aplicación
    - script: |
        echo "Iniciando construcción de la aplicación..."
      displayName: 'Construir la Aplicación'

    # 3. Pruebas correspondientes
    - script: |
        echo "Ejecutando pruebas unitarias..."
      displayName: 'Ejecutar Pruebas Correspondientes'

- stage: DockerLifecycle
  displayName: 'Etapa de Docker (Build & Push)'
  dependsOn: BuildAndTest 
  condition: succeeded()
  jobs:
  - job: DockerPush
    displayName: 'Construir y Publicar en ACR'
    steps:
    # 4, 5 y 6. Proceso nativo unificado a través de Azure CLI (Evita congelamientos)
    - task: AzureCLI@2
      displayName: 'Docker Build y Push mediante Azure CLI'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # 1. Autenticar el motor de Docker del agente directamente con tu ACR
          echo "Autenticando en el ACR..."
          az acr login --name $(acrLoginServer)
          
          # 2. Construir la imagen localmente usando el Dockerfile de la raíz
          echo "Iniciando Docker Build nativo..."
          docker build -t $(acrLoginServer)/$(imageRepository):latest -t $(acrLoginServer)/$(imageRepository):$(Build.BuildId) -f $(dockerfilePath) $(Build.SourcesDirectory)
          
          # 3. Subir las imágenes al registro de Azure
          echo "Iniciando Docker Push nativo..."
          docker push $(acrLoginServer)/$(imageRepository):latest
          docker push $(acrLoginServer)/$(imageRepository):$(Build.BuildId)