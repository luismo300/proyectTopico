trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: acrdemo123456
  imageName: proyecttopico
  tag: latest

steps:

# 1. Descargar código
- checkout: self

# 2. Construir imagen Docker
- script: |
    docker build -t $(imageName):$(tag) .
  displayName: Build Docker image

# 3. Login a ACR (esto fallará hasta que tengas conexión Azure)
- script: |
    echo "az acr login --name $(acrName)"
  displayName: Login to ACR (placeholder)

# 4. Tag de la imagen
- script: |
    docker tag $(imageName):$(tag) $(acrName).azurecr.io/$(imageName):$(tag)
  displayName: Tag image

# 5. Push a ACR (también requiere login real)
- script: |
    echo "docker push $(acrName).azurecr.io/$(imageName):$(tag)"
  displayName: Push image (placeholder)