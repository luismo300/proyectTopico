trigger:
  - main  # Se ejecuta automáticamente cuando subes cambios a la rama main

pool:
  vmImage: 'ubuntu-latest' # Agente Linux ideal para compilar Docker

variables:
  # Nombre exacto de tu Service Connection (tipo Azure Resource Manager)
  azureServiceConnection: 'AzureServiceConnection' 
  # Tu servidor ACR completo
  acrLoginServer: 'luismo123456.azurecr.io'
  # Nombre del repositorio/imagen dentro de tu ACR
  imageRepository: 'proyecttopico'
  # RUTA CORREGIDA: Apunta a tu subcarpeta real del repositorio donde está el Dockerfile
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'

stages:
- stage: BuildAndTest
  displayName: 'Etapa de Construcción y Pruebas'
  jobs:
  - job: CompileAndTest
    displayName: 'Compilar y Probar Aplicación'
    steps:
    # 1. Obtener código fuente
    - checkout: self
      displayName: 'Obtener Código Fuente'

    # 2. Construir la aplicación
    - script: |
        echo "Iniciando construcción de la aplicación..."
      displayName: 'Construir la Aplicación'

    # 3. Pruebas correspondientes
    - script: |
        echo "Ejecutando pruebas unitarias..."
      displayName: 'Ejecutar Pruebas Correspondientes'

- stage: DockerLifecycle
  displayName: 'Etapa de Docker (Build & Push)'
  dependsOn: BuildAndTest 
  condition: succeeded()
  jobs:
  - job: DockerPush
    displayName: 'Construir y Publicar en ACR'
    steps:
    # 4. Autenticarse en Azure Container Registry
    - task: AzureCLI@2
      displayName: 'Autenticar Docker en el ACR'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(acrLoginServer)

    # 5. Docker Build (CORREGIDO: Sin parámetro containerRegistry)
    - task: Docker@2
      displayName: 'Docker Build'
      inputs:
        containerRegistryType: 'Azure Container Registry'
        azureSubscriptionEndpoint: '$(azureServiceConnection)'
        azureContainerRegistry: '$(acrLoginServer)'
        repository: '$(imageRepository)'
        command: 'build'
        Dockerfile: '$(dockerfilePath)'
        tags: |
          latest
          $(Build.BuildId)

    # 6. Docker Push (CORREGIDO: Sin parámetro containerRegistry)
    - task: Docker@2
      displayName: 'Docker Push (Publicar en ACR)'
      inputs:
        containerRegistryType: 'Azure Container Registry'
        azureSubscriptionEndpoint: '$(azureServiceConnection)'
        azureContainerRegistry: '$(acrLoginServer)'
        repository: '$(imageRepository)'
        command: 'push'
        tags: |
          latest
          $(Build.BuildId)