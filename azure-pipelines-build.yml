trigger:
  - main  # Se ejecuta automáticamente cuando subes cambios a la rama main

pool:
  vmImage: 'ubuntu-latest' # Agente Linux ideal para compilar Docker

variables:
  # Cambia estos valores según los nombres exactos de tu proyecto
  azureServiceConnection: 'AzureServiceConnection' 
  acrLoginServer: 'luismo123456.azurecr.io'
  imageRepository: 'proyecttopico'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile' # Asegúrate de que el Dockerfile esté en la raíz

stages:
- stage: BuildAndTest
  displayName: 'Etapa de Construcción y Pruebas'
  jobs:
  - job: CompileAndTest
    displayName: 'Compilar y Probar Aplicación'
    steps:
    # 1. Obtener código fuente (Azure DevOps lo hace automáticamente al iniciar el Job)
    - checkout: self
      displayName: 'Obtener Código Fuente'

    # 2. Construir la aplicación e implementar pruebas
    # NOTA: Modifica esta sección según el lenguaje de tu app (Java, Node.js, Python, etc.)
    # Como ejemplo genérico se simulan comandos de construcción y pruebas:
    - script: |
        echo "Iniciando construcción de la aplicación..."
        # Ej: npm install && npm run build   u  ./gradlew build
      displayName: 'Construir la Aplicación'

    - script: |
        echo "Ejecutando pruebas unitarias..."
        # Ej: npm test  o  ./gradlew test
      displayName: 'Ejecutar Pruebas Correspondientes'

- stage: DockerLifecycle
  displayName: 'Etapa de Docker (Build & Push)'
  dependsOn: BuildAndTest # Solo avanza si las pruebas del stage anterior pasaron con éxito
  condition: succeeded()
  jobs:
  - job: DockerPush
    displayName: 'Construir y Publicar en ACR'
    steps:
    # 3. Autenticarse en Azure Container Registry usando la conexión federada
    - task: AzureCLI@2
      displayName: 'Autenticar Docker en el ACR'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(acrLoginServer)

    # 4 y 5. Construir la imagen asignándole una etiqueta (Tag) fija y una dinámica
    - task: Docker@2
      displayName: 'Docker Build'
      inputs:
        repository: '$(imageRepository)'
        command: 'build'
        Dockerfile: '$(dockerfilePath)'
        containerRegistry: '$(azureServiceConnection)'
        tags: |
          latest
          $(Build.BuildId)  # Usa el ID único del Pipeline como versión/etiqueta

    # 6. Publicar las imágenes (Push) en tu Azure Container Registry
    - task: Docker@2
      displayName: 'Docker Push (Publicar en ACR)'
      inputs:
        repository: '$(imageRepository)'
        command: 'push'
        containerRegistry: '$(azureServiceConnection)'
        tags: |
          latest
          $(Build.BuildId)