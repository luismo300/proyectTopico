trigger:
  none 

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'AzureServiceConnection'
  acrLoginServer: 'luismo123456.azurecr.io'
  imageRepository: 'proyecttopico'
  resourceGroup: 'rg-aci-demo'              
  aciContainerName: 'aci-demo' 
  
stages:
- stage: DeployToACI
  displayName: 'Despliegue en ACI'
  jobs:
  - job: Deploy
    steps:
    - task: AzureCLI@2
      displayName: 'Actualizar Contenedor'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          
          echo "=== 1. PREPARANDO ACR ==="
          az acr update --name luismo123456 --admin-enabled true --resource-group $(resourceGroup)
          ACR_PASSWORD=$(az acr credential show --name luismo123456 --query "passwords[0].value" -o tsv)
          
          echo "=== 2. DIAGNÓSTICO: ¿EXISTE LA IMAGEN $(Build.BuildId)? ==="
          # Esto listará los tags reales en tu ACR para confirmar si la imagen existe
          az acr repository show-tags --name luismo123456 --repository $(imageRepository) --output table
          
          echo "=== 3. ELIMINANDO INSTANCIA ANTERIOR ==="
          az container delete --resource-group $(resourceGroup) --name $(aciContainerName) --yes || true
          
          echo "=== 4. DESPLEGANDO VERSIÓN: $(Build.BuildId) ==="
          az container create \
            --resource-group $(resourceGroup) \
            --name $(aciContainerName) \
            --image $(acrLoginServer)/$(imageRepository):latest \
            --registry-login-server $(acrLoginServer) \
            --registry-username "luismo123456" \
            --registry-password $ACR_PASSWORD \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5 \
            --ports 80 \
            --restart-policy OnFailure \
            --environment-variables ENTORNOMODE="Produccion" VERSION="$(Build.BuildId)"
            
          echo "=== Despliegue finalizado exitosamente ==="