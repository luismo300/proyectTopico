trigger:
  none

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'AzureServiceConnection'
  acrLoginServer: 'luismo123456.azurecr.io'
  imageRepository: 'proyecttopico'
  
  # Variables de Destino
  resourceGroup: 'rg-aci-demo'              
  aciContainerName: 'aci-proyecttopico'
  dnsNameLabel: 'luis-mouse-app-topico2026' # Si da error de DNS, cámbiale un número al final
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'

stages:
- stage: DeployToACI
  displayName: 'Etapa de Despliegue en ACI'
  jobs:
  - job: ContainerDeployment
    displayName: 'Desplegar Imagen en Azure Container Instances'
    steps:

    - checkout: self
      displayName: 'Obtener Código Fuente'

# PASO 2 CORREGIDO: Autenticación automática por Token (Evita fallos de contraseña)
    - task: AzureCLI@2
      displayName: 'Crear o Actualizar Contenedor en ACI'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "=== 1. ASEGURANDO USUARIO ADMINISTRADOR EN EL ACR ==="
          az acr update --name luismo123456 --admin-enabled true --resource-group $(resourceGroup)
          
          echo "=== 2. GENERANDO TOKEN DE ACCESO TEMPORAL ==="
          # Generamos un token de acceso directo del canal de Azure sin usar comandos propensos a errores
          ACR_TOKEN=$(az acr login --name luismo123456 --expose-token --output tsv --query accessToken)
          
          echo "=== 3. DETECTANDO UBICACIÓN DEL GRUPO DE RECURSOS ==="
          DETECTED_LOCATION=$(az group show --name $(resourceGroup) --query location -o tsv)
          echo "La región detectada es: $DETECTED_LOCATION"
          
          echo "=== 4. CREANDO O ACTUALIZANDO EL CONTENEDOR EN ACI ==="
          # Usamos el Token generado como contraseña de despliegue seguro
          az container create \
            --resource-group $(resourceGroup) \
            --name $(aciContainerName) \
            --image $(acrLoginServer)/$(imageRepository):latest \
            --location $DETECTED_LOCATION \
            --cpu 1 \
            --memory 1.5Gi \
            --registry-login-server $(acrLoginServer) \
            --registry-username "00000000-0000-0000-0000-000000000000" \
            --registry-password $ACR_TOKEN \
            --dns-name-label $(dnsNameLabel) \
            --ports 80 \
            --environment-variables ENTORNOMODE="Produccion" VERSION="$(Build.BuildId)" \
            --restart-policy OnFailure
            
          echo "=== Proceso de creación enviado ==="

    # PASO 3: Validación robusta del ciclo de vida
    - task: AzureCLI@2
      displayName: 'Verificar Estado y Validar Aplicación'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "=== 5. VERIFICANDO EXISTENCIA Y ESTADO ==="
          CONTAINER_STATE=$(az container show --resource-group $(resourceGroup) --name $(aciContainerName) --query "instanceView.state" -o tsv 2>/dev/null || echo "NotFound")
          echo "El estado actual del contenedor es: $CONTAINER_STATE"
          
          if [ "$CONTAINER_STATE" = "NotFound" ]; then
             echo "##[error] El contenedor no existe en Azure. Por favor, ve a la tarea anterior ('Crear o Actualizar Contenedor en ACI') y revisa las últimas 10 líneas del log para ver el mensaje de error nativo de Azure."
             exit 1
          fi
          
          if [ "$CONTAINER_STATE" != "Running" ]; then
             echo "##[error] El recurso existe pero no pudo iniciar. Estado: $CONTAINER_STATE"
             exit 1
          fi
          
          echo "=== 6. OBTENIENDO URL PÚBLICA DE VALIDACIÓN ==="
          ACI_URL=$(az container show --resource-group $(resourceGroup) --name $(aciContainerName) --query "ipAddress.fqdn" -o tsv)
          echo "La aplicación está respondiendo en de forma pública en: http://$ACI_URL"
          
          echo "=== 7. PROBANDO RESPUESTA HTTP (CURL) ==="
          curl -s -I http://$ACI_URL | head -n 1