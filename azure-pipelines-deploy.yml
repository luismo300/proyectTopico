trigger: none

pool:
  vmImage: ubuntu-latest

variables:
  resourceGroup: rg-aci-demo
  containerName: aci-demo
  acrName: acrdemo123456
  imageName: proyectTopico
  tag: latest

steps:

- task: AzureCLI@2
  inputs:
    azureSubscription: 'AzureServiceConnection'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |

      az container delete \
        --resource-group $(resourceGroup) \
        --name $(containerName) \
        --yes

      az container create \
        --resource-group $(resourceGroup) \
        --name $(containerName) \
        --image $(acrName).azurecr.io/$(imageName):$(tag) \
        --cpu 1 \
        --memory 1 \
        --registry-login-server $(acrName).azurecr.io