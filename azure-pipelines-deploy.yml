trigger:
  none

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'AzureServiceConnection'
  acrLoginServer: 'luismo123456.azurecr.io'
  imageRepository: 'proyecttopico'
  
  # Variables de Destino
  resourceGroup: 'rg-aci-demo'              # Tu grupo de recursos detectado
  aciContainerName: 'aci-proyecttopico'
  dnsNameLabel: 'luis-mouse-app-topico'    # Recomiendo cambiar este DNS por si el anterior ya está tomado
  locationRegion: 'eastus'                  # Región estable para Azure for Students

stages:
- stage: DeployToACI
  displayName: 'Etapa de Despliegue en ACI'
  jobs:
  - job: ContainerDeployment
    displayName: 'Desplegar Imagen en Azure Container Instances'
    steps:

    - checkout: self
      displayName: 'Obtener Código Fuente'

    # PASO 2 CORREGIDO: Incluye ubicación explícita (--location)
    - task: AzureCLI@2
      displayName: 'Crear o Actualizar Contenedor en ACI'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "=== 1. OBTENIENDO CREDENCIALES DEL ACR ==="
          ACR_PASSWORD=$(az acr repository registry-credentials show --name $(acrLoginServer) --query "passwords[0].value" -o tsv)
          ACR_USERNAME="luismo123456"
          
          echo "=== 2. CREANDO O ACTUALIZANDO EL CONTENEDOR EN ACI ==="
          # Forzamos la ubicación en una región con alta disponibilidad de cuotas
          az container create \
            --resource-group $(resourceGroup) \
            --name $(aciContainerName) \
            --image $(acrLoginServer)/$(imageRepository):latest \
            --location $(locationRegion) \
            --cpu 1 \
            --memory 1.5Gi \
            --registry-login-server $(acrLoginServer) \
            --registry-username $ACR_USERNAME \
            --registry-password $ACR_PASSWORD \
            --dns-name-label $(dnsNameLabel) \
            --ports 80 \
            --environment-variables ENTORNOMODE="Produccion" VERSION="$(Build.BuildId)" \
            --restart-policy OnFailure
            
          echo "=== Intento de creación finalizado ==="

    # PASO 3 CORREGIDO: Manejo de errores por si no se encuentra el recurso
    - task: AzureCLI@2
      displayName: 'Verificar Estado y Validar Aplicación'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "=== 3. VERIFICANDO QUE EL CONTENEDOR ESTÉ EN EJECUCIÓN ==="
          
          # Consultar el estado protegiendo el script de caídas drásticas si no se encuentra
          CONTAINER_STATE=$(az container show --resource-group $(resourceGroup) --name $(aciContainerName) --query "instanceView.state" -o tsv 2>/dev/null || echo "NotFound")
          echo "El estado actual del contenedor es: $CONTAINER_STATE"
          
          if [ "$CONTAINER_STATE" = "NotFound" ]; then
             echo "##[error] El contenedor no pudo ser creado en el paso anterior. Revisa los logs del Paso 2 para ver el motivo (puede ser saturación de la región o DNS duplicado)."
             exit 1
          fi
          
          if [ "$CONTAINER_STATE" != "Running" ]; then
             echo "##[error] El contenedor existe pero no está en ejecución. Estado actual: $CONTAINER_STATE"
             exit 1
          fi
          
          echo "=== 4. OBTENIENDO URL PÚBLICA DE VALIDACIÓN ==="
          ACI_URL=$(az container show --resource-group $(resourceGroup) --name $(aciContainerName) --query "ipAddress.fqdn" -o tsv)
          echo "La aplicación está en vivo en: http://$ACI_URL"
          
          echo "=== 5. PROBANDO RESPUESTA HTTP ==="
          curl -s -I http://$ACI_URL | head -n 1