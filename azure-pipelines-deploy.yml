trigger:
  none # Cambia a 'main' si quieres que se dispare automáticamente con cada push

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'AzureServiceConnection'
  acrLoginServer: 'luismo123456.azurecr.io'
  imageRepository: 'proyecttopico'
  
  # Variables de Destino (Configuradas para tu recurso existente)
  resourceGroup: 'rg-aci-demo'              
  aciContainerName: 'aci-demo' # Nombre del ACI que ya tienes
  locationRegion: 'eastus2'
  # Nota: El DNS label usualmente no se puede cambiar una vez creado el ACI, 
  # por lo que el parámetro --dns-name-label es opcional si ya existe.
  
stages:
- stage: DeployToACI
  displayName: 'Etapa de Despliegue en ACI'
  jobs:
  - job: ContainerDeployment
    displayName: 'Desplegar Imagen en Azure Container Instances'
    steps:

    - task: AzureCLI@2
      displayName: 'Actualizar Contenedor en ACI'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "=== 1. OBTENIENDO CREDENCIALES DEL ACR ==="
          # Obtenemos las credenciales para asegurar que ACI pueda descargar la imagen
          ACR_PASSWORD=$(az acr credential show --name luismo123456 --query "passwords[0].value" -o tsv)
          ACR_USERNAME="luismo123456"
          
          echo "=== 2. DESPLEGANDO/ACTUALIZANDO EL CONTENEDOR $(aciContainerName) ==="
          # El comando 'create' de Azure CLI actúa como 'upsert' (crea si no existe, actualiza si existe)
          az container create \
            --resource-group $(resourceGroup) \
            --name $(aciContainerName) \
            --image $(acrLoginServer)/$(imageRepository):latest \
            --registry-login-server $(acrLoginServer) \
            --registry-username $ACR_USERNAME \
            --registry-password $ACR_PASSWORD \
            --cpu 1 \
            --memory 1.5 \
            --ports 80 \
            --restart-policy OnFailure \
            --environment-variables ENTORNOMODE="Produccion" VERSION="$(Build.BuildId)"
            
          echo "=== Despliegue finalizado exitosamente ==="

    - task: AzureCLI@2
      displayName: 'Validar Estado del Contenedor'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "=== 3. VERIFICANDO ESTADO ==="
          STATE=$(az container show --resource-group $(resourceGroup) --name $(aciContainerName) --query "instanceView.state" -o tsv)
          echo "El estado actual es: $STATE"
          
          FQDN=$(az container show --resource-group $(resourceGroup) --name $(aciContainerName) --query "ipAddress.fqdn" -o tsv)
          echo "Tu aplicación está disponible en: http://$FQDN"